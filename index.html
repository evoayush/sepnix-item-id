<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Items Library - Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .header {
            background: #1a1a2e;
            color: #ffd700;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
        }
        .header p {
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .iframe-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 90vh;
            background: #111;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
        .footer {
            background: #1a1a2e;
            color: #888;
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }
        .footer a {
            color: #ffd700;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.2rem; }
            .iframe-container { height: 85vh; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔫 Free Fire Items Library</h1>
        <p>All items, skins, bundles & more</p>
    </div>

    <div class="iframe-container">
        <iframe 
            src="https://ff-item.netlify.app/" 
            allowfullscreen 
            loading="lazy"
            title="Free Fire Items Library"
        ></iframe>
    </div>

    <div class="footer">
        <p>
            Content sourced from 
            <a href="https://ff-item.netlify.app/" target="_blank">ff-item.netlify.app</a> | 
            Developed by <a href="#" target="_blank">Sepnix</a> © 2026
        </p>
    </div>
</body>
</html>
